<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REBORNX MEME</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#0b0b0f;
color:white;
}

/* NAV */

nav{
padding:20px 6%;
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
position:sticky;
top:0;
}

.logo{
font-weight:900;
font-size:22px;
background:linear-gradient(90deg,#ff3c00,#ff00aa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* HERO */

.hero{
padding:80px 6%;
text-align:center;
}

.hero h1{
font-size:64px;
margin:0;
}

.hero p{
opacity:.7;
margin-top:10px;
}

.btn{
margin-top:25px;
display:inline-block;
padding:12px 28px;
background:linear-gradient(90deg,#ff3c00,#ff00aa);
border-radius:999px;
text-decoration:none;
color:white;
font-weight:700;
}

/* MEME GRID */

.grid{
padding:40px 6%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.meme{
background:#15151c;
border-radius:18px;
overflow:hidden;
transition:.3s;
}

.meme:hover{
transform:translateY(-6px);
}

.meme img{
width:100%;
height:220px;
object-fit:cover;
}

.meme p{
padding:14px;
font-size:15px;
}

/* FOOTER */

footer{
padding:50px;
text-align:center;
opacity:.4;
}

</style>
</head>

<body>

<nav>
<div class="logo">REBORNX</div>
<div>Meme Portal</div>
</nav>

<div class="hero">
<h1>Crypto Meme Culture</h1>
<p>Daily viral memes • alpha vibes • community energy</p>
<a class="btn" href="#">Join Telegram</a>
</div>

<div class="grid">

<div class="meme">
<img src="https://picsum.photos/400/300?1">
<p>When you sell before pump 😭</p>
</div>

<div class="meme">
<img src="https://picsum.photos/400/300?2">
<p>Diamond hands activated 💎</p>
</div>

<div class="meme">
<img src="https://picsum.photos/400/300?3">
<p>Solana speed be like 🚀</p>
</div>

<div class="meme">
<img src="https://picsum.photos/400/300?4">
<p>Waiting for perfect entry forever 🤡</p>
</div>

<div class="meme">
<img src="https://picsum.photos/400/300?5">
<p>CT drama loading…</p>
</div>

<div class="meme">
<img src="https://picsum.photos/400/300?6">
<p>New narrative every week</p>
</div>

</div>

<footer>
REBORNX Meme Portal © 2026
</footer>

</body>
</html>
