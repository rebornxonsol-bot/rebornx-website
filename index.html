<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REBORNX Meme Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#0b0b0f;
color:white;
}

/* NAV */

nav{
padding:18px 6%;
display:flex;
justify-content:space-between;
background:#111;
position:sticky;
top:0;
z-index:99;
}

.logo{
font-weight:900;
font-size:22px;
background:linear-gradient(90deg,#ff3c00,#ff00aa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* HERO SLIDER */

.slider{
height:65vh;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transform:scale(1.1);
transition:1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{
opacity:1;
transform:scale(1);
}

/* MEME GRID */

.grid{
padding:40px 6%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.meme{
background:#15151c;
border-radius:18px;
overflow:hidden;
transition:.3s;
}

.meme:hover{
transform:translateY(-6px);
}

.meme img{
width:100%;
height:220px;
object-fit:cover;
}

.meme p{
padding:12px;
font-size:14px;
}

.like{
padding:0 12px 12px;
font-size:14px;
cursor:pointer;
opacity:.7;
}

button{
display:block;
margin:40px auto;
padding:14px 32px;
border:none;
background:linear-gradient(90deg,#ff3c00,#ff00aa);
color:white;
border-radius:999px;
font-weight:700;
cursor:pointer;
}

footer{
padding:60px;
text-align:center;
opacity:.4;
}

</style>
</head>

<body>

<nav>
<div class="logo">REBORNX</div>
<div>Meme Portal</div>
</nav>

<!-- HERO AUTO SLIDER -->

<div class="slider">

<div class="slide active">
<img src="https://source.unsplash.com/random/1200x700?crypto">
</div>

<div class="slide">
<img src="https://source.unsplash.com/random/1200x701?bitcoin">
</div>

<div class="slide">
<img src="https://source.unsplash.com/random/1200x702?trading">
</div>

<div class="slide">
<img src="https://source.unsplash.com/random/1200x703?technology">
</div>

</div>

<!-- MEMES -->

<div class="grid" id="grid">

<!-- initial memes -->

</div>

<button onclick="load()">Load More Memes</button>

<footer>
REBORNX Meme Portal © 2026
</footer>

<script>

/* HERO SLIDER */

let slides=document.querySelectorAll(".slide")
let i=0

setInterval(()=>{
slides[i].classList.remove("active")
i++
if(i>=slides.length)i=0
slides[i].classList.add("active")
},3500)

/* MEME SYSTEM */

let grid=document.getElementById("grid")

function meme(){
let div=document.createElement("div")
div.className="meme"

let img=document.createElement("img")
img.src="https://source.unsplash.com/random/400x30"+Math.floor(Math.random()*100)+"?crypto"

let p=document.createElement("p")
p.innerText="Crypto life meme 😂"

let like=document.createElement("div")
like.className="like"
like.innerText="❤️ 0"

like.onclick=function(){
let n=parseInt(like.innerText.split(" ")[1])
like.innerText="❤️ "+(n+1)
}

div.appendChild(img)
div.appendChild(p)
div.appendChild(like)

grid.appendChild(div)
}

function load(){
for(let i=0;i<6;i++){
meme()
}
}

/* first load */

load()
load()

</script>

</body>
</html>
