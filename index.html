<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REBORNX</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#050507;
color:white;
text-align:center;
overflow-x:hidden;
}

/* animated background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%,#ff3c0030 0%,transparent 25%),
radial-gradient(circle at 80% 70%,#ff000020 0%,transparent 25%);
animation:bgmove 12s linear infinite;
z-index:-1;
}

@keyframes bgmove{
0%{transform:translateY(0)}
50%{transform:translateY(-50px)}
100%{transform:translateY(0)}
}

/* HERO */

header{
position:relative;
padding:200px 20px;
}

header::before{
content:"";
position:absolute;
width:900px;
height:900px;
background:radial-gradient(circle,#ff2a00 0%,transparent 60%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
animation:pulse 4s infinite;
opacity:.9;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(.8)}
50%{transform:translate(-50%,-50%) scale(1.3)}
100%{transform:translate(-50%,-50%) scale(.8)}
}

/* VERY BIG LOGO */

.logo{
width:420px;
max-width:90%;
filter:drop-shadow(0 0 60px #ff3c00);
animation:float 5s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0)}
}

/* TEXT */

.tag{
margin-top:20px;
opacity:.7;
font-size:20px;
}

/* BUTTONS */

.btnWrap{
margin-top:40px;
}

.btn{
display:inline-block;
margin:12px;
padding:16px 40px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
font-size:16px;
transition:.3s;
}

.tg{
background:#ff3c00;
box-shadow:0 0 30px #ff3c00;
color:white;
}

.tg:hover{
transform:scale(1.08);
}

.xbtn{
border:2px solid #ff3c00;
color:white;
}

.xbtn:hover{
background:#ff3c00;
transform:scale(1.08);
}

/* MEME */

.section{
padding:80px 20px;
}

.memeBox{
position:relative;
height:120px;
max-width:600px;
margin:50px auto;
}

.meme{
position:absolute;
width:100%;
background:rgba(20,20,30,0.6);
backdrop-filter:blur(14px);
padding:30px;
border-radius:22px;
opacity:0;
transform:translateY(60px);
transition:.8s;
border:1px solid rgba(255,60,0,0.4);
}

.meme.active{
opacity:1;
transform:translateY(0);
}

footer{
padding:50px;
opacity:.5;
}

</style>
</head>

<body>

<header>

<img src="rebornx-logo.png" class="logo">

<div class="tag">Crypto Memes • Alpha • Community</div>

<div class="btnWrap">
<a href="https://t.me/Rebornx_sol" class="btn tg">Join Telegram</a>
<a href="https://x.com/RebornxSol" class="btn xbtn">Follow on X</a>
</div>

</header>

<div class="section">
<h2>🔥 Viral Meme Feed</h2>

<div class="memeBox">
<div class="meme active">Solana when gas = zero 🚀</div>
<div class="meme">Buy high sell low club 😂</div>
<div class="meme">Diamond hands vs paper hands 💎</div>
<div class="meme">Waiting perfect entry forever 🤡</div>
<div class="meme">Whales watching silently 🐋</div>
<div class="meme">Liquidity tsunami coming 🌊</div>
<div class="meme">Bullish vibes only 🔥</div>
</div>

</div>

<footer>
© 2026 REBORNX
</footer>

<script>

let memes=document.querySelectorAll(".meme")
let i=0

setInterval(()=>{
memes[i].classList.remove("active")
i++
if(i>=memes.length)i=0
memes[i].classList.add("active")
},2000)

</script>

</body>
</html>
