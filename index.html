<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REBORNX Memes</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#0a0a0d;
color:white;
}

/* NAV */

nav{
padding:18px 6%;
display:flex;
justify-content:space-between;
background:#111;
}

.logo{
font-weight:900;
font-size:22px;
background:linear-gradient(90deg,#ff3c00,#ff00aa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* HERO SLIDER */

.slider{
height:65vh;
position:relative;
overflow:hidden;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transform:scale(1.1);
transition:1.2s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{
opacity:1;
transform:scale(1);
}

/* GRID */

.grid{
padding:40px 6%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.meme{
background:#15151c;
border-radius:18px;
overflow:hidden;
transition:.3s;
}

.meme:hover{
transform:translateY(-6px);
}

.meme img{
width:100%;
height:220px;
object-fit:cover;
}

.meme p{
padding:14px;
font-size:15px;
}

footer{
padding:50px;
text-align:center;
opacity:.4;
}

</style>
</head>

<body>

<nav>
<div class="logo">REBORNX</div>
<div>Meme Portal</div>
</nav>

<!-- AUTO HERO MEME SLIDER -->

<div class="slider">

<div class="slide active">
<img src="https://source.unsplash.com/random/1200x700?crypto">
</div>

<div class="slide">
<img src="https://source.unsplash.com/random/1200x701?trading">
</div>

<div class="slide">
<img src="https://source.unsplash.com/random/1200x702?bitcoin">
</div>

<div class="slide">
<img src="https://source.unsplash.com/random/1200x703?technology">
</div>

</div>

<!-- MEME GRID -->

<div class="grid">

<div class="meme">
<img src="https://source.unsplash.com/random/400x300?meme1">
<p>Sold early pain 😭</p>
</div>

<div class="meme">
<img src="https://source.unsplash.com/random/401x300?meme2">
<p>Diamond hands 💎</p>
</div>

<div class="meme">
<img src="https://source.unsplash.com/random/402x300?crypto">
<p>Solana speed 🚀</p>
</div>

<div class="meme">
<img src="https://source.unsplash.com/random/403x300?chart">
<p>Waiting entry forever 🤡</p>
</div>

<div class="meme">
<img src="https://source.unsplash.com/random/404x300?market">
<p>CT drama loading</p>
</div>

<div class="meme">
<img src="https://source.unsplash.com/random/405x300?bitcoin">
<p>New narrative</p>
</div>

</div>

<footer>
REBORNX Meme Portal © 2026
</footer>

<script>

let slides = document.querySelectorAll(".slide")
let i = 0

setInterval(()=>{

slides[i].classList.remove("active")

i++
if(i>=slides.length) i=0

slides[i].classList.add("active")

},3500)

</script>

</body>
</html>
