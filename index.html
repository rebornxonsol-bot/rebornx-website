<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REBORNX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#050505,#120000,#050505);
color:white;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:40px;
padding:15px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:10;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#ff4a00;
}

/* MENU ICON */

.menu-icon{
display:none;
position:absolute;
right:25px;
font-size:28px;
cursor:pointer;
}

/* FULL SCREEN MENU */

.menu{
position:fixed;
top:0;
right:-100%;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:25px;
transition:0.4s;
z-index:20;
}

.menu a{
color:white;
text-decoration:none;
font-size:24px;
}

.menu a:hover{
color:#ff4a00;
}

.menulogo{
font-size:40px;
color:#ff4a00;
margin-bottom:30px;
}

.close{
position:absolute;
top:30px;
right:30px;
font-size:30px;
cursor:pointer;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:80px;
color:#ff4a00;
text-shadow:0 0 40px red;
}

.hero p{
font-size:22px;
margin-top:10px;
}

/* BUTTON */

.btn{
margin-top:30px;
padding:16px 40px;
background:#ff4a00;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* SECTION */

.section{
padding:120px 20px;
max-width:1000px;
margin:auto;
text-align:center;
}

h2{
color:#ff4a00;
font-size:38px;
margin-bottom:30px;
}

/* TOKENOMICS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.box{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:12px;
backdrop-filter:blur(10px);
}

/* ROADMAP */

.roadmap{
display:flex;
flex-direction:column;
gap:25px;
}

.step{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:12px;
}

.step ul{
list-style:none;
margin-top:10px;
}

.step li{
margin:8px 0;
color:#ddd;
}

/* COPY BUTTON */

.copybtn{
margin-top:15px;
padding:10px 20px;
background:#ff4a00;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* FOOTER */

footer{
background:#000;
padding:40px;
text-align:center;
}

/* MOBILE */

@media(max-width:768px){

nav{
justify-content:flex-start;
gap:20px;
padding-left:20px;
}

nav a{
display:none;
}

.menu-icon{
display:block;
}

.hero h1{
font-size:45px;
}

.hero p{
font-size:18px;
}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<nav>

<a href="#home">Home</a>
<a href="#tokenomics">Tokenomics</a>
<a href="#chart">Chart</a>
<a href="#roadmap">Roadmap</a>
<a href="https://x.com/rebornxonsol" target="_blank">X</a>

<div class="menu-icon" onclick="openMenu()">☰</div>

</nav>

<div id="menu" class="menu">

<div class="close" onclick="closeMenu()">✕</div>

<div class="menulogo">REBORNX</div>

<a href="#home">Home</a>
<a href="#tokenomics">Tokenomics</a>
<a href="#chart">Chart</a>
<a href="#roadmap">Roadmap</a>
<a href="https://x.com/rebornxonsol" target="_blank">X</a>

</div>

<div class="hero" id="home">

<h1>REBORNX</h1>

<p>
The Dragon Rises Again  
<br>
Community Meme Coin on Solana
</p>

<a class="btn" href="https://pump.fun" target="_blank">
Launch on Pump.fun
</a>

</div>

<footer>
REBORNX © 2026  
Community Driven Meme Coin
</footer>

<script>

function openMenu(){
document.getElementById("menu").style.right="0";
}

function closeMenu(){
document.getElementById("menu").style.right="-100%";
}

function copyCA(){
navigator.clipboard.writeText("COMING SOON");
alert("Contract Address Coming Soon");
}

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<100;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.5
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.y-=p.speed;
if(p.y<0){p.y=canvas.height;}

ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,p.size,p.size);
});

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
