<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>REBORNX Social</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#0b0b0f;
color:white;
}

/* layout */

.container{
display:flex;
}

/* sidebar */

.sidebar{
width:230px;
background:#111;
min-height:100vh;
padding:20px;
position:fixed;
}

.logo{
font-size:22px;
font-weight:900;
margin-bottom:30px;
background:linear-gradient(90deg,#ff3c00,#ff00aa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.menu div{
margin:16px 0;
opacity:.7;
cursor:pointer;
}

/* feed */

.feed{
margin-left:230px;
flex:1;
}

/* hero */

.slider{
height:260px;
overflow:hidden;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{
opacity:1;
}

/* memes */

.grid{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:#15151c;
border-radius:18px;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card p{
padding:10px;
}

.actions{
padding:0 10px 12px;
font-size:14px;
opacity:.7;
}

/* trending */

.trending{
padding:20px;
border-top:1px solid #ffffff10;
}

.trend{
margin:10px 0;
opacity:.7;
}

/* upload */

.upload{
position:fixed;
bottom:25px;
right:25px;
background:linear-gradient(90deg,#ff3c00,#ff00aa);
padding:18px;
border-radius:50%;
font-size:22px;
cursor:pointer;
}

@media(max-width:800px){
.sidebar{display:none}
.feed{margin:0}
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<div class="logo">REBORNX</div>
<div class="menu">
<div>🏠 Feed</div>
<div>🔥 Trending</div>
<div>⭐ Popular</div>
<div>👤 Profile</div>
</div>

<div class="trending">
<b>Trending</b>
<div class="trend">Solana memes</div>
<div class="trend">Bull run vibes</div>
<div class="trend">CT drama</div>
</div>

</div>

<div class="feed">

<div class="slider">
<div class="slide active"><img src="https://source.unsplash.com/random/1200x400?crypto"></div>
<div class="slide"><img src="https://source.unsplash.com/random/1200x401?bitcoin"></div>
<div class="slide"><img src="https://source.unsplash.com/random/1200x402?trading"></div>
</div>

<div class="grid" id="grid"></div>

</div>

</div>

<div class="upload">+</div>

<script>

/* hero slider */

let slides=document.querySelectorAll(".slide")
let i=0

setInterval(()=>{
slides[i].classList.remove("active")
i++
if(i>=slides.length)i=0
slides[i].classList.add("active")
},3500)

/* memes */

let grid=document.getElementById("grid")

function meme(){
let card=document.createElement("div")
card.className="card"

let img=document.createElement("img")
img.src="https://source.unsplash.com/random/400x30"+Math.floor(Math.random()*100)+"?crypto"

let p=document.createElement("p")
p.innerText="Crypto meme 😂"

let act=document.createElement("div")
act.className="actions"
act.innerText="❤️ 0   💬 0"

card.appendChild(img)
card.appendChild(p)
card.appendChild(act)

grid.appendChild(card)
}

for(let j=0;j<12;j++) meme()

</script>

</body>
</html>
