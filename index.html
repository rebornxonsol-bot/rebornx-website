<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REBORNX</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial;
background:linear-gradient(135deg,#050505,#1a0000);
color:white;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
background:black;
padding:15px;
display:flex;
justify-content:center;
gap:30px;
z-index:10;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.logo{
width:420px;
max-width:95%;
margin-bottom:25px;
filter:drop-shadow(0 0 35px #ff4a00);
}

.hero h1{
font-size:36px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
opacity:0.8;
margin-bottom:30px;
}

/* BUTTON */

.btn{
background:#ff4a00;
padding:15px 40px;
border-radius:10px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* PARTICLES */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<nav>
<a href="#">Home</a>
<a href="#">Tokenomics</a>
<a href="#">Chart</a>
<a href="#">Roadmap</a>
<a href="https://x.com/rebornxonsol" target="_blank">X</a>
</nav>

<section class="hero">

<img src="file_00000000c14c71fa90328e3ab768893c.png" class="logo">

<h1>The Dragon Rises Again</h1>

<p>Community Meme Coin on Solana</p>

<a class="btn" href="#">Launch on Pump.fun</a>

</section>

<script>

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.5
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
p.y+=p.speed;

if(p.y>canvas.height){
p.y=0;
p.x=Math.random()*canvas.width;
}

ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,p.size,p.size);

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
